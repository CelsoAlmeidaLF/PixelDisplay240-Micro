<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelDisplay240 IDE v5 - ESP32 Display Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="app-container">

        <!-- GLOBAL HEADER -->
        <header>
            <div class="logo">
                <i data-lucide="palette" class="icon" style="color: var(--primary);"></i>
                <div style="display: flex; flex-direction: column; line-height: 1;">
                    <h1 style="margin: 0;">PixelDisplay240 <span
                            style="color: var(--primary); font-weight: 800;">v5</span>
                    </h1>
                    <span
                        style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700;">Pro
                        Edition • Studio</span>
                </div>
            </div>



            <div class="header-actions">
                <button id="btn-undo" class="secondary-btn icon-btn" title="Desfazer (Ctrl+Z)"><i
                        data-lucide="undo"></i></button>
                <button id="btn-redo" class="secondary-btn icon-btn" title="Refazer (Ctrl+Y)"><i
                        data-lucide="redo"></i></button>
                <div class="divider"></div>
                <button id="btn-upload" class="secondary-btn" onclick="document.getElementById('file-input').click()"><i
                        data-lucide="upload"></i> Importar</button>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <div class="divider"></div>
                <button id="btn-save-project" class="secondary-btn icon-btn" title="Salvar Projeto"><i
                        data-lucide="save"></i></button>
                <button id="btn-load-project" class="secondary-btn icon-btn" title="Abrir Projeto"><i
                        data-lucide="folder-open"></i></button>
                <input type="file" id="project-input" accept=".json" style="display: none;">

                <button id="btn-help" class="secondary-btn icon-btn"><i data-lucide="help-circle"></i></button>
                <button id="btn-export" class="primary-btn"><i data-lucide="download"></i> Exportar</button>
            </div>
        </header>

        <main id="main-views">
            <!-- VIEW: DESIGN -->
            <div id="design-view" class="view-panel active">
                <aside class="toolbar">
                    <div class="tool-group">
                        <label>Ferramentas</label>
                        <div class="grid">
                            <button id="tool-brush" class="tool-btn active" title="Pincel (B)"><i
                                    data-lucide="paintbrush"></i></button>
                            <button id="tool-eraser" class="tool-btn" title="Borracha (E)"><i
                                    data-lucide="eraser"></i></button>
                            <button id="tool-selection" class="tool-btn" title="Seleção (M)"><i
                                    data-lucide="scissors"></i></button>
                            <button id="tool-move" class="tool-btn" title="Mover (V)"><i
                                    data-lucide="move"></i></button>
                            <button id="tool-line" class="tool-btn" title="Linha (L)"><i
                                    data-lucide="ruler"></i></button>
                            <button id="tool-rect" class="tool-btn" title="Retângulo (R)"><i
                                    data-lucide="square"></i></button>
                            <button id="tool-circle" class="tool-btn" title="Círculo (C)"><i
                                    data-lucide="circle"></i></button>
                            <button id="tool-picker" class="tool-btn" title="Conta-gotas (Alt)"><i
                                    data-lucide="pipette"></i></button>
                            <button id="tool-text" class="tool-btn" title="Texto (T)"><i
                                    data-lucide="type"></i></button>
                            <button id="tool-fill" class="tool-btn" title="Balde de Tinta (F)"><i
                                    data-lucide="paint-bucket"></i></button>
                            <button id="tool-font-gen" class="tool-btn" title="Gerador de Fontes"><i
                                    data-lucide="languages"></i></button>
                            <button id="tool-clear" class="tool-btn" title="Limpar Tudo"><i
                                    data-lucide="trash-2"></i></button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Simetria</label>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <button id="btn-sym-x" class="secondary-btn small-btn" style="width: 100%;"><i
                                    data-lucide="divide"></i> Simetria X</button>
                            <button id="btn-sym-y" class="secondary-btn small-btn" style="width: 100%;"><i
                                    data-lucide="divide" style="transform: rotate(90deg);"></i> Simetria Y</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Controles de Imagem</label>
                        <div id="transform-controls" class="grid" style="display: none;">
                            <button id="btn-apply-img" class="primary-btn small-btn">Aplicar</button>
                            <button id="btn-cancel-img" class="secondary-btn small-btn">Cancelar</button>
                            <div class="input-field" style="grid-column: span 2;">
                                <span>Zoom Imagem</span>
                                <input type="range" id="img-zoom" min="0.1" max="5" step="0.1" value="1">
                                <span id="img-zoom-val" style="font-size: 0.7rem;">1.0x</span>
                            </div>
                        </div>
                        <div class="grid">
                            <button id="btn-clear-guides" class="secondary-btn small-btn"><i data-lucide="delete"></i>
                                Limpar Guias</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Filtros</label>
                        <div class="grid">
                            <button id="filter-gray" class="secondary-btn small-btn">PB</button>
                            <button id="filter-invert" class="secondary-btn small-btn">Inv</button>
                            <button id="filter-bright" class="secondary-btn small-btn">Br+</button>
                            <button id="filter-contrast" class="secondary-btn small-btn">Co+</button>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Ajustes</label>
                        <div class="input-field">
                            <span>Pincel: <span id="brush-size-val">2</span>px</span>
                            <input type="range" id="brush-size" min="1" max="50" value="2">
                        </div>
                        <div class="input-field">
                            <span>Cor</span>
                            <input type="color" id="color-picker" value="#38bdf8">
                        </div>
                        <div class="input-field">
                            <span>Dithering</span>
                            <select id="brush-pattern">
                                <option value="solid">Sólido</option>
                                <option value="checker">Xadrez</option>
                                <option value="dots">Pontilhado</option>
                                <option value="lines">Linhas</option>
                            </select>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Paleta</label>
                        <div id="color-palette" class="palette-grid">
                            <button id="btn-save-color" class="add-color-btn">+</button>
                        </div>
                        <select id="palette-presets" style="margin-top:8px;">
                            <option value="custom">Personalizada</option>
                            <option value="pico8">PICO-8</option>
                            <option value="nes">NES</option>
                            <option value="gameboy">GameBoy</option>
                        </select>
                    </div>
                </aside>

                <section class="editor-area">
                    <div class="canvas-container">
                        <div style="display: flex;">
                            <div
                                style="width: 25px; height: 25px; background: var(--card-bg); border: 1px solid var(--border); border-bottom: none; border-right: none;">
                            </div>
                            <div id="ruler-h" class="ruler ruler-h" style="flex: 1; border-bottom: none;"></div>
                        </div>
                        <div class="canvas-middle" style="display: flex;">
                            <div id="ruler-v" class="ruler ruler-v"></div>
                            <div id="canvas-wrapper" class="canvas-wrapper clipping">
                                <div id="layers-container">
                                    <canvas id="temp-canvas" width="240" height="240"></canvas>
                                    <canvas id="grid-canvas" width="240" height="240"></canvas>
                                    <div id="guides-container"></div>
                                    <div id="image-transform-layer"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <aside class="sidebar">
                    <div class="tool-group">
                        <label>Visualização</label>
                        <div id="preview-wrapper" class="preview-box preview-dark">
                            <canvas id="preview-canvas" width="240" height="240"
                                style="width:100%; height:auto;"></canvas>
                        </div>
                        <div class="grid" style="margin-top:8px;">
                            <label class="check-container">
                                <input type="checkbox" id="toggle-grid" checked>
                                <span class="checkmark"></span> Grid
                            </label>
                            <label class="check-container">
                                <input type="checkbox" id="toggle-ruler" checked>
                                <span class="checkmark"></span> Réguas
                            </label>
                            <label class="check-container">
                                <input type="checkbox" id="toggle-guides" checked>
                                <span class="checkmark"></span> Guias
                            </label>
                        </div>
                        <div class="grid" style="margin-top:8px;">
                            <select id="preview-style">
                                <option value="dark">Escuro</option>
                                <option value="light">Claro</option>
                                <option value="check">Grid</option>
                            </select>
                        </div>
                        <div class="input-field compact" style="margin-top:8px;">
                            <span>Zoom: <span id="work-zoom-val">100</span>%</span>
                            <input type="range" id="work-zoom" min="50" max="800" value="100" step="10">
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Camadas</label>
                        <div id="layers-list" class="layers-list" style="max-height: 150px; overflow-y: auto;"></div>
                        <div style="display: flex; gap:5px; margin-top: 5px;">
                            <button id="btn-add-layer" class="secondary-btn small-btn" style="flex:1;"><i
                                    data-lucide="plus"></i> Camada</button>
                            <button id="btn-merge-layers" class="secondary-btn small-btn" title="Achatar"><i
                                    data-lucide="layers"></i></button>
                        </div>
                    </div>



                    <div class="tool-group">
                        <label>Live Code (C++)</label>
                        <div class="code-preview-panel">
                            <div id="live-code-preview">// Aguardando...</div>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Config Projeto</label>
                        <div class="input-field"><span>Nome Sprite</span><input type="text" id="array-name"
                                value="image_01"></div>
                        <div class="grid" style="margin-top:8px;">
                            <div class="input-field"><span>W</span><input type="number" id="canvas-width" value="240">
                            </div>
                            <div class="input-field"><span>H</span><input type="number" id="canvas-height" value="240">
                            </div>
                        </div>
                        <div class="input-field"><span>Fundo</span><input type="color" id="bg-color-picker"
                                value="#000000"></div>
                        <div class="input-field">
                            <span>Formato</span>
                            <select id="export-format">
                                <option value="rgb565">RGB565</option>
                                <option value="rgb888">RGB888</option>
                            </select>
                        </div>
                    </div>

                    <div class="tool-group">
                        <label>Coleção & Animação</label>
                        <div id="sprite-list" class="sprite-list"></div>
                        <div style="display: flex; gap:5px; margin-top:8px;">
                            <button id="btn-add-collection" class="secondary-btn small-btn" style="flex:1;">📦
                                Col.</button>
                            <button id="btn-play-anim" class="secondary-btn small-btn">▶️</button>
                        </div>
                    </div>
                </aside>
            </div>


        </main>

        <!-- STATUS BAR (Footer) -->
        <footer id="status-bar">
            <div class="status-left">
                <span id="status-view"><i data-lucide="layout" style="width:12px;height:12px;"></i> Design</span>
                <span class="status-sep">|</span>
                <span id="status-canvas">240 × 240</span>
                <span class="status-sep">|</span>
                <span id="status-zoom">Zoom: 100%</span>
            </div>
            <div class="status-center">
                <span id="status-project">PixelDisplay240 v5</span>
            </div>
            <div class="status-right">

                <span id="status-time"></span>
            </div>
        </footer>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <!-- Error/Warning: bottom center -->
    <div id="toast-error-container"></div>
    <!-- Success: bottom right -->
    <div id="toast-success-container"></div>

    <!-- MODALS -->
    <div id="export-modal" class="modal">
        <div class="modal-content">
            <h2>Exportar</h2>
            <textarea id="output-text" readonly></textarea>
            <div class="header-actions" style="justify-content: flex-end; gap: 8px;">
                <button id="btn-download-bmp" class="secondary-btn small-btn">BMP</button>
                <button id="btn-download-jpg" class="secondary-btn small-btn">JPG</button>
                <button id="btn-download-bin" class="secondary-btn small-btn">BIN</button>
                <button id="btn-download" class="primary-btn">Download .h</button>
                <button id="btn-close-modal" class="text-btn">Fechar</button>
            </div>
        </div>
    </div>

    <div id="help-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Guia PixelDisplay240</h2>
            <p>Atalhos: Ctrl+Z (Undo), Ctrl+Y (Redo), Alt (Picker).</p>
            <button id="btn-close-help" class="primary-btn">Fechar</button>
        </div>
    </div>

    <div id="font-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Gerador de Fontes</h2>
            <input type="text" id="font-family" value="Arial">
            <input type="number" id="font-size" value="16">
            <textarea id="font-output" readonly></textarea>
            <button id="btn-gen-font" class="primary-btn">Gerar</button>
            <button id="btn-close-font" class="text-btn">Fechar</button>
        </div>
    </div>

    <!-- CUSTOM DIALOG (replaces alert/confirm/prompt) -->
    <div id="custom-dialog" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 420px; text-align: center;">
            <div id="dialog-icon" style="margin-bottom: 1rem;"></div>
            <h3 id="dialog-title" style="margin-bottom: 0.5rem;"></h3>
            <p id="dialog-message" style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;"></p>
            <input type="text" id="dialog-input" style="display:none; margin-bottom: 1rem; text-align: center;">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="dialog-cancel" class="secondary-btn"
                    style="display:none; min-width: 100px;">Cancelar</button>
                <button id="dialog-confirm" class="primary-btn" style="min-width: 100px;">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Emergency icon reload
        window.addEventListener('load', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>

</html>
